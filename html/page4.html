<!DOCTYPE HTML>
<html lang = "vi">
<head> <title>Trang Web Giới Thiệu Bản Thân</title> </head>
        <meta charset = "UTF-8">
        <link rel = "stylesheet" href = "../css/style4.css">
<body>
    <table border="1">
        <tr>
            <th>STT</th>
            <th>Tên hàng</th>
            <th>Số lượng</th>
            <th>Đơn giá</th>
            <th>Thành tiền</th>
        </tr>

        <tr>
            <td>1</td>
            <td>A</td>
            <td class="sl">3</td>
            <td class="dg">1000</td>
            <td class="tt"> </td>
        </tr>
        <tr>
            <td>2</td>
            <td>B</td>
            <td class="sl">4</td>
            <td class="dg">2000</td>
            <td class="tt"> </td>
        </tr>
        <tr>
            <td>3</td>
            <td>C</td>
            <td class="sl">5</td>
            <td class="dg">4000</td>
            <td class="tt"> </td>
        </tr>
        <tr>
            <td>4</td>
            <td>D</td>
            <td class="sl">2</td>
            <td class="dg">5000</td>
            <td class="tt"> </td>
        </tr>

        <tr>
            <td colspan="3">Tổng thanh toán</td>
            <td colspan="2", id="tong"> </td>
        </tr>

    </table>

    <script>
        const donGia = document.getElementsByClassName("dg");
        const soLuong = document.getElementsByClassName("sl");
        const thanhTien = document.getElementsByClassName("tt");
        let tong = 0;
        for (let i = 0; i < donGia.length; i++) {
            thanhTien[i].innerHTML = soLuong[i].innerHTML * donGia[i].innerHTML;
            tong = tong + parseInt(thanhTien[i].innerHTML);
        }
        document.getElementById("tong").innerHTML = tong;
    </script>



</body>
</html>
