<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4 mb-4">
        <a href="page7.html">Sản phẩm</a> / <a href="#">Chi tiết sản phẩm</a>
    </div>

    <div class="container mb-5">
        <div class="row">
            <div class="col-md-6 text-center">
                <img id="p-image" src="" alt="Hình ảnh xe" class="img-fluid rounded border">
            </div>
            
            <!-- Cột phải: Thông tin sản phẩm -->
            <div class="col-md-6">
                <h2 id="p-name" class="fw-bold text-dark"></h2>
                <h4 id="p-price" class="text-danger mt-3 mb-4"></h4>
                <div id="p-description" class="text-dark lh-lg" style="text-align: justify;"></div>
                
                <!-- ĐÂY LÀ NÚT ĐẶT HÀNG MỚI THÊM -->
                <!-- mt-4 để cách phần mô tả một khoảng, px-4 py-2 để nút to ra một chút nhìn cho đẹp -->
                <button class="btn btn-primary mt-4 px-4 py-2 fw-bold">Đặt hàng</button>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>

</body>
</html>
