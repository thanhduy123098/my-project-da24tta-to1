<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Sản Phẩm</title>
    <!-- Nhúng Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- ĐOẠN TIÊU ĐỀ VÀ NÚT THÊM -->
    <div class="container mt-4 mb-4">
        <h2 class="text-center fw-bold text-danger text-uppercase">Giới thiệu sản phẩm</h2>
        
        <!-- Căn phải nút Thêm -->
        <div class="text-end mt-3">
            <button class="btn btn-success fw-bold" onclick="openAddModal()">
                + Thêm sản phẩm
            </button>
        </div>
    </div>

    <!-- KHỐI CHỨA DANH SÁCH -->
    <div class="container mb-5">
        <div class="row product-list"></div>
    </div>

    <!-- KHUNG FORM ẨN (MODAL) DÙNG ĐỂ THÊM/SỬA -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle">Thêm sản phẩm mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <!-- ID ẩn để JS biết đang sửa hay thêm -->
                        <input type="hidden" id="productId">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên sản phẩm</label>
                            <input type="text" class="form-control" id="productName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Giá tiền</label>
                            <input type="text" class="form-control" id="productPrice" placeholder="VD: 50.000.000 VNĐ" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Hình ảnh (URL)</label>
                            <input type="text" class="form-control" id="productImage" placeholder="../asset/images/tên-hình.jpg">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô tả</label>
                            <textarea class="form-control" id="productDesc" rows="3" required></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="saveProduct()">Lưu sản phẩm</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Nhúng Bootstrap JS (Bắt buộc phải có để Form Modal bật lên được) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- File code của mình -->
    <script src="../js/main.js"></script>
    
</body>
</html>
